defaults:
  - _self_
  - launcher: local
  - data: pusht
  - model: lewm

output_model_name: lewm
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
embed_dim: 192
history_size: 3

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 128
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

num_preds: 1

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

# World-model prediction-error video logging on the val set (validation/eval only).
# Tiles non-overlapping windows of `window_size` consecutive data points over each val
# episode, accumulates per-sample latent prediction error per window, and logs videos of
# the worst/best windows to wandb each eval interval. See wm_error_logging.py.
wm_error_logging:
  enabled: true
  window_size: 8
  stride: 8                  # non-overlapping; set < window_size for an overlapping slide
  num_videos: 10             # per bucket (high-error and low-error)
  fps: 4
  eval_every_n_epochs: null  # null = run on every validation epoch
  frame_select: first        # which frame of each data point to show (first|last)

# Linear-probe decodability of block pose from the WM latent (validation only; needs a dataset
# with the block_pose column, e.g. data=blocksuite_drop_landed). Each val epoch fits a ridge map
# latent -> z / quaternion on a FIXED val-episode split and logs held-out R^2. See probe_logging.py.
probe_logging:
  enabled: true
  eval_split: 0.3            # fraction of val EPISODES held out (fixed for the whole run) for probe R^2
  ridge_lambda: 1.0          # SCALE-FREE ridge: penalty = lambda * mean feature energy (~lambda*N).
                             # ~1 = shrinkage comparable to signal; needed because temporally
                             # correlated frames -> few independent samples -> OLS overfits.
  eval_every_n_epochs: null  # null = run on every validation epoch
